<footer class="bg-primary-800 dark:bg-primary-950 text-white">
  <div class="container mx-auto px-4 py-12">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
      <div>
        <h3 class="text-lg font-semibold mb-4 font-sans">Contact Us</h3>
        <app-contact-info [textClass]="'mb-2 text-white dark:text-gray-300'"
          [directionsClass]="'inline-flex items-center text-accent-400 hover:text-accent-300 transition-colors duration-200'" />
      </div>

      <div>
        <h3 class="text-lg font-semibold mb-4 font-sans">Quick Links</h3>
        <ul class="space-y-2">
          <li><a routerLink="/services/religious-services" class="hover:text-accent-400 transition text-gray-300">Services</a></li>
          <li><a routerLink="/services/weekly-programs" class="hover:text-accent-400 transition text-gray-300">Activities</a></li>
          <li><a routerLink="/about" class="hover:text-accent-400 transition text-gray-300">About Us</a></li>
          <li><a routerLink="/contact" class="hover:text-accent-400 transition text-gray-300">Contact</a></li>
        </ul>
      </div>

      <div>
        <h3 class="text-lg font-semibold mb-4 font-sans">Services</h3>
        <ul class="space-y-2">
          <li><a routerLink="/services/weekly-programs" class="hover:text-accent-400 transition text-gray-300">Weekly Programs</a>
          </li>
          <li><a routerLink="/events" class="hover:text-accent-400 transition text-gray-300">Monthly Programs</a></li>
          <li><a routerLink="/services/religious-services" class="hover:text-accent-400 transition text-gray-300">Religious
              Services</a></li>
        </ul>
      </div>

      <div>
        <h3 class="text-lg font-semibold mb-4 font-sans">Support Us</h3>
        <p class="mb-4 text-gray-300">Your contributions help us serve the community better.</p>
        <app-donation-button
          buttonClass="inline-block bg-accent-500 text-white px-6 py-2 rounded-lg hover:bg-accent-600 transition"
          context="footer" />
      </div>
    </div>

    <div class="border-t border-primary-700 mt-12 pt-8">
      <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="text-center md:text-left">
            <p class="text-primary-300">&copy; {{ currentYear }} Gurudwara Singh Sabha Richmond VA. All rights reserved.</p>
          </div>
          <div class="text-center md:text-right">
            <div class="flex justify-center md:justify-end space-x-6 mt-4">
              <app-social-links location="footer"></app-social-links>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</footer>
